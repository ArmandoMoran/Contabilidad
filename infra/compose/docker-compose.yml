services:
  postgres:
    image: postgres:18
    container_name: contabilidad-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: contabilidad
      POSTGRES_USER: contabilidad
      POSTGRES_PASSWORD: contabilidad_dev
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust --auth-local=trust"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contabilidad"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: contabilidad-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: contabilidad-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/contabilidad-xml;
      mc mb --ignore-existing local/contabilidad-pdf;
      mc mb --ignore-existing local/contabilidad-acuses;
      mc mb --ignore-existing local/contabilidad-attachments;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: contabilidad-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  wiremock:
    image: wiremock/wiremock:latest
    container_name: contabilidad-wiremock
    restart: unless-stopped
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --verbose

volumes:
  postgres_data:
  minio_data:
