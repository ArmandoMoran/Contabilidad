server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: contabilidad
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:contabilidad}}
    username: ${DB_USER:contabilidad}
    password: ${DB_PASSWORD:contabilidad_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

# JWT
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5176,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5176}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-in-production-minimum-256-bits-long-key-here}
    access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:30}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_REGION:}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin123}
    bucket-xml: ${STORAGE_BUCKET_XML:contabilidad-xml}
    bucket-pdf: ${STORAGE_BUCKET_PDF:contabilidad-pdf}
    bucket-acuses: ${STORAGE_BUCKET_ACUSES:contabilidad-acuses}
    bucket-attachments: ${STORAGE_BUCKET_ATTACHMENTS:contabilidad-attachments}
  sat:
    mode: ${SAT_MODE:simulated}
    validation-url: ${SAT_VALIDATION_URL:http://localhost:8089/sat/v1}
  pac:
    mode: ${PAC_MODE:simulated}
    base-url: ${PAC_BASE_URL:http://localhost:8089/pac/v1}
    user: ${PAC_USER:}
    password: ${PAC_PASSWORD:}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.contabilidad: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
