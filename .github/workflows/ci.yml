name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '22'

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: contabilidad_test
          POSTGRES_USER: contabilidad
          POSTGRES_PASSWORD: contabilidad_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw verify -B -Dspring.profiles.active=test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: contabilidad_test
          DB_USER: contabilidad
          DB_PASSWORD: contabilidad_dev

      - name: Check coverage thresholds
        working-directory: backend
        run: |
          echo "Coverage reports generated — enforce 85% line / 75% branch in JaCoCo config"

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm test:coverage

      - name: Check coverage thresholds
        run: |
          echo "Enforce 80% line / 70% branch coverage in vitest config"

  api-tests:
    name: API Tests
    needs: [backend-test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: contabilidad_test
          POSTGRES_USER: contabilidad
          POSTGRES_PASSWORD: contabilidad_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build backend
        working-directory: backend
        run: ./mvnw package -B -DskipTests

      - name: Start backend
        working-directory: backend
        run: |
          java -jar app/target/app-*.jar --spring.profiles.active=test &
          sleep 15
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: contabilidad_test
          DB_USER: contabilidad
          DB_PASSWORD: contabilidad_dev

      - name: Run API tests
        working-directory: backend
        run: |
          echo "REST Assured API tests go here"

  e2e-smoke:
    name: E2E Smoke Tests
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Playwright
        working-directory: e2e
        run: |
          pnpm install --frozen-lockfile || true
          echo "Playwright E2E tests placeholder"

  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint OpenAPI spec
        run: |
          npx @stoplight/spectral-cli lint openapi/contabilidad-api.yaml || true

  docker-build:
    name: Docker Image Build
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          echo "docker build -f backend/Dockerfile -t contabilidad-backend ."
          echo "Docker build placeholder"

      - name: Build frontend image
        run: |
          echo "docker build -f frontend/Dockerfile -t contabilidad-frontend ."
          echo "Docker build placeholder"
